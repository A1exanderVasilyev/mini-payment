server:
  port: 8080

spring:
  application:
    name: mini-payment

  devtools:
    restart:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/payments
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/changelog-master.yaml
    drop-first: false
    default-schema: public

logging:
  level:
    liquibase: DEBUG
    org.springframework.boot: DEBUG
    org.springframework.context: DEBUG