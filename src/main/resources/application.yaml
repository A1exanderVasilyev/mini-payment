server:
  port: 8080

spring:
  application:
    name: mini-payment

  devtools:
    restart:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/payments
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/changelog-master.yaml
    drop-first: false
    default-schema: public

  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis

app:
  cache:
    payments-ttl: 60s
    users-ttl: 60s